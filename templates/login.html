<!DOCTYPE html>
<html>
<head>
    <title>Login - CareerMantra AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-12 max-w-md w-full border border-white/20 shadow-2xl">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">🎯 CareerMantra AI</h1>
            <p class="text-white/70">Sign in to continue your interview prep</p>
        </div>
        
        <!-- ERROR MESSAGES (Backend se aayenge) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-red-500/20 border-l-4 border-red-500 text-red-100 p-4 rounded-xl mb-6 backdrop-blur-sm animate-pulse">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <!-- LOGIN FORM (Backend Connected) -->
        <form action="/login" method="POST" class="space-y-6">
            <input 
                type="text" 
                name="username" 
                required 
                placeholder="Username or Email" 
                class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                autocomplete="username"
            >
            <input 
                type="password" 
                name="password" 
                required 
                placeholder="Password" 
                class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl text-white placeholder-white/60 focus:outline-none focus:ring-2 focus:ring-white/50 transition-all"
                autocomplete="current-password"
            >
            <button type="submit" class="w-full p-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-2xl font-bold text-xl hover:scale-105 hover:shadow-xl transition-all shadow-lg">
                🚀 Login →
            </button>
        </form>
        
        <div class="text-center mt-8">
            <p class="text-white/60">Don't have an account? 
                <a href="/register" class="text-indigo-400 font-bold hover:text-white transition-colors">Sign Up</a>
            </p>
            <p class="text-white/50 text-sm mt-4 bg-gray-800/50 p-3 rounded-xl">
                👉 <strong>Demo Login:</strong> rupesh / 123456
            </p>
        </div>
    </div>
</body>
</html>
