<!DOCTYPE html>
<html>
<head>
    <title>Profile - CareerMantra AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-indigo-600 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <a href="/" class="inline-flex items-center gap-2 mb-8 px-6 py-3 bg-white text-blue-700 rounded-2xl font-bold hover:bg-gray-100">
            ← Back to Dashboard
        </a>
        
        <h1 class="text-5xl font-bold text-white text-center mb-16">📊 Your Progress</h1>
        
        <div class="grid md:grid-cols-2 gap-8">
            <!-- Stats Cards -->
            <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 border border-white/30">
                <h2 class="text-3xl font-bold text-white mb-6">🏆 Current Level</h2>
                <div class="text-6xl font-bold text-white text-center">Level 7</div>
                <div class="w-full bg-white/30 rounded-full h-4 mt-4">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-500 h-4 rounded-full" style="width: 70%"></div>
                </div>
                <p class="text-white/80 mt-2">70% Complete</p>
            </div>
            
            <!-- Recent Practice -->
            <div class="bg-white/20 backdrop-blur-xl rounded-3xl p-8 border border-white/30">
                <h2 class="text-3xl font-bold text-white mb-6">📈 Recent Scores</h2>
                <div class="space-y-3">
                    <div class="flex justify-between text-white">
                        <span>Level 6</span><span>9/10 ✅</span>
                    </div>
                    <div class="flex justify-between text-white">
                        <span>Level 5</span><span>8/10 ✅</span>
                    </div>
                    <div class="flex justify-between text-white">
                        <span>Level 4</span><span>10/10 ✅</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
